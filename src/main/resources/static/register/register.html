<!DOCTYPE html>
<html>

<head>
	<link rel="stylesheet" type="text/css" href="register.css">
	<title>Register</title>
</head>

<body>

	<div class=topnav>
		<a href="/index.html" id = "autosearch">AUTOSEARCH</a> <a href="/login/login.html">Login</a>
		
	</div>
	
<div class = "registerContainer">
	<h1>Register</h1>
	<form id="registerForm">
		<input type="text" id="username" placeholder="Username" required><br>
		<input type="password" id="password" placeholder="Password (min 8 chars)" minlength="8" required><br>
		<input type="email" id="email" placeholder="Email" required><br>
		<button type="submit" id = "registerButton">Register</button>
		<div id = "logInContainer">
			<p>Already have an account?</p>
			<a href = "/login/login.html" id = "loginLink">Log in</a>
		</div>
	</form>
	</div>

	

	<script src="registerscript.js"></script>
	<p id="message"></p>
</body>

</html>
