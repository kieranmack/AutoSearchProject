<!DOCTYPE html>
<html>
<head>
<title>Search Screen</title>
</head>
<body>
	<h1>Select Below to Find the Car For You!</h1>
<div class = "carParams">
	<label for="makeSelect">Choose Make:</label>

	<select name="cars" id="makeSelect">
		<option value="default">--Makes--</option>
		<option value="Toyota">Toyota</option>
		<option value= "Honda">Honda</option>
	</select>

	<label for="modelSelect">Choose Model:</label>

	<select name="cars" id="modelSelect">
		<option value="default">--Models--</option>
		<option value="Corolla">Corolla</option>
	</select>
	
	<label for = "yearSelect">Choose Year:</label>
	
	<select name ="cars" id = "yearSelect">
		<option value = "default">--Years--</option>
		<option value = "1960-1969">1980-1989</option>
		<option value = "1970-1979">1970-1979</option>
		<option value = "1980-1989">1980-1989</option>
		<option value = "1990-1999">1990-1999</option>
		<option value = "2000-2009">2000-2009</option>
		<option value = "2010-2019">2010-2019</option>
		<option value = "2020-2026">2020-2026</option>
	</select>
	
	<label for = "minPriceSlider">Choose Minimum Price:</label>
	
	<input type = "range" min = "0" max = "65000" value = "0" class = "slider"
	id = "minPriceSlider">
	
</div>

<br>
<br>


	<button id="searchButton">Execute Search</button>
	
	<button id = "favoritesButton">View Favorites</button>

	<p id="message"></p>

	<script src="searchscript.js"></script>




</body>

</html>
