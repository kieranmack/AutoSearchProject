<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link rel="stylesheet" href="/admindash/admin.css">
</head>

<body>


<div class="topnav">
    <h2>AUTOSEARCH | ADMIN</h2>
</div>


<div class="container">

    
    <div class="left-panel">

       
        <div class="scrape-box">
            <p id="timer">Next scrape in: --</p>
            <button id="manualTrigger">Trigger Scrape</button>
        </div>

     
        <p id="scrapeSummary">Last Recorded Scrape: </p>

      
        <div class="table-section">
            <h3>Recently Added Cars</h3>

            <table id="carTable">
                <thead>
                    <tr>
                        <th>Make</th>
                        <th>Model</th>
                        <th>Year</th>
                        <th>Price</th>
                        <th>Added Date</th>
                    </tr>
                </thead>

                <tbody>
                    <!-- JS populates -->
                </tbody>
            </table>
        </div>

    </div>

    
    <div class="right-panel">

        <h3>System Stats</h3>

        <p><strong>Users:</strong> <span id="userCount">0</span></p>
        <p><strong>Cars:</strong> <span id="carCount">0</span></p>
        <p><strong>Favorites:</strong> <span id="favCount">0</span></p>

    </div>

</div>

<!-- Scripts -->
<script src="/admindash/admin.js"></script>

</body>
</html>
