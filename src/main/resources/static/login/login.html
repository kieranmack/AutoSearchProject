<!DOCTYPE html>
<html>

<link rel="stylesheet" type="text/css" href="login.css">
<head>

	<title>AutoSearch Login</title>
</head>

<body>
	<div class=topnav>
		
		<a href="/index.html">AUTOSEARCH |</a> <a href="/login/login.html" id = "loginButton">Login</a>
		<a href="/register/register.html">Register</a>
	</div>

	<div class="loginContainer">
		<h1>Login</h1>
		<form id="loginForm" novalidate>
		<div class = "input-group">
			<input type="text" id="username" placeholder="Username" required><br>
			<p id = "errorUsername" style = "display: none">Username is required</p>
		</div>
		<div class = "input-group">
			<input type="password" id="password" placeholder="Password" required><br>
			<p id = "errorPassword" style = "display:none">Password is required</p>
		</div>
		<div class = "input-group">
			
			<p id = "errorFull" style = "display: none"></p>
		</div>
			<button type="submit" id = 'loginButton'>Login</button><br>
			<p>Dont have an account?</p>
			<a href = "/register/register.html" id = "regLink">Register Now</a>
			<p>or</p>
			<a href = /searchpage/search.html id = "guestLink">Continue as guest?</a>
		</form>

	</div>

	

	<p id="message"></p>
</body>
<script src="loginscript.js"></script>
</html>
